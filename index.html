<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Intelligent Bio-Diagnostic AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
      body {
        font-family: 'Orbitron', sans-serif;
        background-color: #030613;
        color: #e0e0e0;
      }
      .text-glow {
        text-shadow: 0 0 5px currentColor, 0 0 10px currentColor;
      }
      .box-glow {
        box-shadow: 0 0 8px 2px var(--glow-color, #00f0ff);
      }
       .loader {
        border: 4px solid rgba(0, 240, 255, 0.2);
        border-left-color: #00f0ff;
        border-radius: 50%;
        width: 50px;
        height: 50px;
        animation: spin 1s linear infinite;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      /* Head Glow Animation */
      @keyframes head-glow {
        0%, 100% { 
            filter: drop-shadow(0 0 3px rgba(0, 240, 255, 0.7)); 
            opacity: 0.9;
        }
        50% { 
            filter: drop-shadow(0 0 10px rgba(0, 240, 255, 1)); 
            opacity: 1;
        }
      }
      .head-glow-animate {
        animation: head-glow 4s ease-in-out infinite;
      }

      /* Print Styles */
      @media print {
        body {
            background-color: #fff;
            color: #000;
            font-family: 'Arial', sans-serif;
        }
        header, .report-manager, .input-panel, .print-hide {
            display: none !important;
        }
        .printable-area {
            display: block !important;
            width: 100%;
            padding: 1rem;
        }
        .printable-panel {
          border: 1px solid #ccc;
          padding: 1rem;
          margin-bottom: 1rem;
          page-break-inside: avoid;
        }
        .printable-title {
          font-size: 1.5rem;
          font-weight: bold;
          color: #000;
          text-align: center;
          margin-bottom: 1rem;
          border-bottom: 2px solid #000;
          padding-bottom: 0.5rem;
        }
        .printable-section-title {
          font-size: 1.2rem;
          font-weight: bold;
          border-bottom: 1px solid #eee;
          margin-bottom: 0.5rem;
          padding-bottom: 0.25rem;
        }
        .printable-content p {
          margin-bottom: 0.5rem;
          line-height: 1.4;
        }
        .printable-content strong {
          font-weight: bold;
          color: #000;
        }
      }
    </style>
